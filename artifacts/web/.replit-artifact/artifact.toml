kind = "web"
previewPath = "/"
title = "API Proxy Portal"
version = "1.0.0"
id = "artifacts/web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22333

[services.development]
run = "pnpm --filter @workspace/web run dev"

[services.production]
publicDir = "artifacts/web/dist/public"
serve = "static"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/web", "run", "build"]

[services.production.build.env]
PORT = "22333"
BASE_PATH = "/"
NODE_ENV = "production"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22333"
BASE_PATH = "/"
